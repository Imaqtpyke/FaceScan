name: Build Android APK

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build web assets
        run: npm run build

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Initialize Android platform if not present
        run: |
          if [ ! -d "android" ]; then
            echo "android folder not found, running npx cap add android"
            npx cap add android
          else
            echo "android folder already exists"
          fi

      - name: Generate Capacitor Assets
        run: npx @capacitor/assets generate --android --iconBackgroundColor '#ffffff' --splashBackgroundColor '#ffffff'

      - name: Install Capacitor CLI globally
        run: npm install -g @capacitor/cli

      - name: Sync Capacitor Android
        run: npx cap sync android

      - name: Make Android gradlew executable
        run: chmod +x android/gradlew

      - name: Build Android Debug APK
        run: |
          cd android
          ./gradlew assembleDebug

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: facescan-debug.apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
